<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dinner Ideas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f4f4f6;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 1rem;
    }

    h1 { text-align: center; margin-bottom: 1rem; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    .card img { width: 100%; border-radius: 10px; margin-bottom: 0.5rem; }

    .tags { font-size: 0.85rem; color: #555; margin-bottom: 0.5rem; }

    button {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      border-radius: 12px;
      border: none;
      background: #4f46e5;
      color: white;
      margin-top: 0.5rem;
    }

    form label { display: block; font-weight: 600; margin-top: 0.8rem; }
    form input, form textarea {
      width: 100%; padding: 0.6rem; margin-top: 0.3rem;
      border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;
    }
    form textarea { resize: vertical; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>🍽️ Dinner Ideas</h1>

  <div id="list"></div>

  <button onclick="toggleForm()">➕ Add Dinner</button>

  <!-- Add Dinner Form -->
  <form id="form" class="card hidden">
    <label>Name
      <input id="name" required />
    </label>

    <label>Tags (select or type new)
      <input id="tags" list="tag-options" placeholder="e.g. quick, pasta" />
      <datalist id="tag-options"></datalist>
    </label>

    <label>Photo
      <input id="photo" type="file" accept="image/*" capture="environment" />
    </label>

    <label>Recipe
      <textarea id="recipe" rows="3"></textarea>
    </label>

    <label>Notes
      <textarea id="notes" rows="2"></textarea>
    </label>

    <button type="submit">Save Dinner</button>
  </form>
</div>

<script>
  const dinners = [];
  const knownTags = new Set();
  const list = document.getElementById("list");
  const form = document.getElementById("form");
  const tagOptions = document.getElementById("tag-options");

  // --- Local Storage functions ---
  function saveToLocalStorage() {
    localStorage.setItem("dinners", JSON.stringify(dinners));
  }

  function loadFromLocalStorage() {
    const stored = localStorage.getItem("dinners");
    if (stored) {
      const parsed = JSON.parse(stored);
      parsed.forEach(d => {
        dinners.push(d);
        d.tags.forEach(t => knownTags.add(t));
      });
    }
  }

  loadFromLocalStorage();
  render();

  function toggleForm() { form.classList.toggle("hidden"); }

  function render() {
    list.innerHTML = "";
    dinners.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";

      if (d.photo) {
        const img = document.createElement("img");
        img.src = d.photo;
        card.appendChild(img);
      }

      card.innerHTML += `
        <h2>${d.name}</h2>
        <div class="tags">${d.tags.join(", ")}</div>
        <p><strong>Recipe:</strong> ${d.recipe || "-"}</p>
        <p><strong>Notes:</strong> ${d.notes || "-"}</p>
      `;
      list.appendChild(card);
    });

    tagOptions.innerHTML = "";
    knownTags.forEach(tag => {
      const opt = document.createElement("option");
      opt.value = tag;
      tagOptions.appendChild(opt);
    });
  }

  form.addEventListener("submit", async e => {
    e.preventDefault();
    const name = document.getElementById("name").value;
    const tags = document.getElementById("tags").value.split(",").map(t => t.trim()).filter(Boolean);
    tags.forEach(t => knownTags.add(t));

    const photoFile = document.getElementById("photo").files[0];
    let photoData = null;
    if (photoFile) photoData = await toBase64(photoFile);

    dinners.push({
      name,
      tags,
      photo: photoData,
      recipe: document.getElementById("recipe").value,
      notes: document.getElementById("notes").value
    });

    saveToLocalStorage();
    form.reset();
    form.classList.add("hidden");
    render();
  });

  function toBase64(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  // --- PWA install prompt ---
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    console.log("PWA install available");
  });
</script>

<!-- --- Service Worker Registration --- -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      console.log('Service Worker registered');
    });
  }
</script>

</body>
</html>
